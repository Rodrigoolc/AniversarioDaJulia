<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presentes</title>

<style>
body {
  margin: 0;
  display: flex;
  justify-content: center;
  background: #fde9ee;
}

.container {
  position: relative;
  width: 100%;
  max-width: 500px;
}

.container img {
  width: 100%;
  display: block;
}

.btn {
  position: absolute;
}

/* BOTÃO X (voltar) */
.voltar {
  top: 3%;
  right: 6%;
  width: 9%;
}

.voltar:hover {
  transform: scale(1.1);
}

</style>
</head>

<body>

<div class="container">
  <img src="img/presentes.png">

  <a href="index.html" class="btn voltar">
    <img src="icon/x.png"
  </a>
</div>

</body>
</html>
